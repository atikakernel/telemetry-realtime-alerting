apiVersion: v1
kind: Namespace
metadata:
  name: telemetry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acc-producer
  namespace: telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acc-producer
  template:
    metadata:
      labels:
        app: acc-producer
    spec:
      # hostNetwork: true # Optional: use this if you want the pod to use the 'kind' container network
      containers:
      - name: acc-producer
        image: acc-producer:latest
        imagePullPolicy: Never # Using local images loaded into kind
        ports:
        - containerPort: 9003
          protocol: UDP
        env:
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: UDP_PORT
          value: "9003"
---
apiVersion: v1
kind: Service
metadata:
  name: acc-producer
  namespace: telemetry
spec:
  type: NodePort
  selector:
    app: acc-producer
  ports:
  - port: 9003
    targetPort: 9003
    protocol: UDP
    nodePort: 30003
